      /* Smart TV: notificar native quando input/textarea focado — permite teclado virtual do sistema aceitar @ e letras */
      (function () {
        function check(el) {
          return (
            el &&
            (el.tagName === 'INPUT' ||
              el.tagName === 'TEXTAREA' ||
              el.tagName === 'SELECT' ||
              el.isContentEditable)
          );
        }
        function setFocused(f) {
          try {
            if (window.RedxAndroidBridge) {
              window.RedxAndroidBridge.setInputFocused(f);
              return;
            }
            if (f)
              setTimeout(function () {
                try {
                  if (window.RedxAndroidBridge) window.RedxAndroidBridge.setInputFocused(true);
                } catch (e) {}

          } catch (e) {}
        }
        document.addEventListener(
          'focusin',
          function (e) {
            if (check(e.target)) setFocused(true);
          },
          true
        );
        document.addEventListener(
          'focusout',
          function (e) {
            if (check(e.target)) setFocused(false);
          },
          true
        );
      })();
